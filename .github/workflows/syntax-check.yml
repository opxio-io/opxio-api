name: Syntax Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check syntax on all JS files
        run: |
          echo "Checking syntax..."
          find . -name "*.js" \
            -not -path "./node_modules/*" \
            -not -path "./.git/*" \
            | while read f; do
                node --check "$f" || { echo "SYNTAX ERROR in $f"; exit 1; }
              done
          echo "All files passed."
